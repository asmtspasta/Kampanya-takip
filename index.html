<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kampanya Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #252535;
    --accent: #7eb8f7;
    --accent2: #a78bfa;
    --text: #e2e2f0;
    --muted: #5a5a78;
    --green: #4ade80;
    --red: #f87171;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
}

/* HEADER */
.header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 20px;
position: sticky;
top: 0;
z-index: 100;
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
}

.logo {
font-family: ‘Instrument Serif’, serif;
font-size: 20px;
color: var(–accent);
letter-spacing: -0.3px;
white-space: nowrap;
}

.logo span { color: var(–muted); font-style: italic; font-size: 13px; margin-left: 6px; }

.header-right {
display: flex;
align-items: center;
gap: 10px;
}

.last-update {
font-size: 11px;
color: var(–muted);
text-align: right;
}

.refresh-btn {
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text);
border-radius: 8px;
padding: 8px 14px;
font-size: 13px;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
white-space: nowrap;
transition: border-color 0.2s;
}

.refresh-btn:hover { border-color: var(–accent); color: var(–accent); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* TABS */
.tabs {
display: flex;
gap: 4px;
padding: 12px 16px;
overflow-x: auto;
background: var(–surface);
border-bottom: 1px solid var(–border);
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
background: var(–surface2);
border: 1px solid var(–border);
color: var(–muted);
border-radius: 20px;
padding: 6px 14px;
font-size: 13px;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
flex-shrink: 0;
}

.tab.active {
background: var(–accent);
border-color: var(–accent);
color: #0a0a0f;
font-weight: 500;
}

/* CONTENT */
.content {
padding: 16px;
max-width: 800px;
margin: 0 auto;
}

/* LOADING */
.loading {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 80px 20px;
gap: 16px;
color: var(–muted);
}

.spinner {
width: 32px;
height: 32px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* AIRLINE CARD */
.airline-section {
margin-bottom: 24px;
}

.airline-header {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 12px;
padding: 12px 16px;
background: var(–surface);
border-radius: 12px;
border: 1px solid var(–border);
}

.airline-dot {
width: 10px;
height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.airline-name {
font-size: 15px;
font-weight: 600;
flex: 1;
}

.airline-count {
font-size: 12px;
color: var(–muted);
background: var(–surface2);
border-radius: 10px;
padding: 2px 8px;
}

.airline-link {
font-size: 12px;
color: var(–accent);
text-decoration: none;
}

/* NEWS ITEM */
.news-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px 16px;
margin-bottom: 8px;
cursor: pointer;
transition: border-color 0.15s, background 0.15s;
text-decoration: none;
display: block;
}

.news-item:hover, .news-item:active {
border-color: var(–accent);
background: var(–surface2);
}

.news-title {
font-size: 14px;
color: var(–text);
line-height: 1.5;
margin-bottom: 6px;
}

.news-meta {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.news-source {
font-size: 11px;
color: var(–muted);
}

.news-date {
font-size: 11px;
color: var(–muted);
white-space: nowrap;
}

.new-badge {
background: #1a3a1a;
color: var(–green);
border-radius: 4px;
padding: 1px 6px;
font-size: 10px;
font-weight: 500;
flex-shrink: 0;
}

/* ERROR */
.error-card {
background: #1a0f0f;
border: 1px solid #3a1a1a;
border-radius: 10px;
padding: 14px 16px;
font-size: 13px;
color: var(–red);
margin-bottom: 8px;
}

.empty-card {
background: var(–surface);
border: 1px dashed var(–border);
border-radius: 10px;
padding: 20px;
text-align: center;
font-size: 13px;
color: var(–muted);
}

/* SUMMARY CARDS */
.summary-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin-bottom: 20px;
}

@media (min-width: 500px) {
.summary-grid { grid-template-columns: repeat(3, 1fr); }
}

.summary-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 14px;
cursor: pointer;
transition: border-color 0.15s;
}

.summary-card:active { border-color: var(–accent); }

.summary-card-name {
font-size: 12px;
color: var(–muted);
margin-bottom: 4px;
}

.summary-card-count {
font-size: 22px;
font-family: ‘Instrument Serif’, serif;
color: var(–text);
}

.summary-card-label {
font-size: 11px;
color: var(–muted);
}

.status-dot {
width: 6px;
height: 6px;
border-radius: 50%;
display: inline-block;
margin-right: 4px;
}
</style>

</head>
<body>

<div class="header">
  <div class="logo">Radar<span>kampanya takip</span></div>
  <div class="header-right">
    <div class="last-update" id="lastUpdate">—</div>
    <button class="refresh-btn" id="refreshBtn" onclick="veriCek()">↻ Yenile</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="tabSec('hepsi', this)">Tümü</button>
  <button class="tab" onclick="tabSec('ryanair', this)">Ryanair</button>
  <button class="tab" onclick="tabSec('easyjet', this)">easyJet</button>
  <button class="tab" onclick="tabSec('vueling', this)">Vueling</button>
  <button class="tab" onclick="tabSec('transavia', this)">Transavia</button>
  <button class="tab" onclick="tabSec('airfrance', this)">Air France</button>
</div>

<div class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Kampanyalar yükleniyor...</div>
  </div>
</div>

<script>
  let tumVeri = null;
  let aktifTab = 'hepsi';

  async function veriCek() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Yükleniyor...';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('content').innerHTML = '<div class="loading" id="loading"><div class="spinner"></div><div>Kampanyalar yükleniyor...</div></div>';

    try {
      const res = await fetch('/api/kampanyalar');
      const data = await res.json();
      tumVeri = data;
      renderVeri(data);

      const d = new Date(data.guncelleme);
      document.getElementById('lastUpdate').textContent = 'Güncellendi: ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="error-card">Veri çekilemedi. Lütfen tekrar deneyin.</div>';
    }

    btn.disabled = false;
    btn.textContent = '↻ Yenile';
  }

  function tabSec(id, el) {
    aktifTab = id;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (tumVeri) renderVeri(tumVeri);
  }

  function renderVeri(data) {
    const content = document.getElementById('content');
    const havayollari = data.havayollari;

    if (aktifTab === 'hepsi') {
      // Özet kartlar
      let html = '<div class="summary-grid">';
      havayollari.forEach(h => {
        html += `
          <div class="summary-card" onclick="tabSecById('${h.id}')">
            <div class="summary-card-name">
              <span class="status-dot" style="background:${h.renk}"></span>${h.ad}
            </div>
            <div class="summary-card-count">${h.haberler.length}</div>
            <div class="summary-card-label">haber / kampanya</div>
          </div>
        `;
      });
      html += '</div>';

      // Tüm haberler birleşik
      const tumHaberler = [];
      havayollari.forEach(h => {
        h.haberler.forEach(haber => {
          tumHaberler.push({ ...haber, havayolu: h });
        });
      });

      if (!tumHaberler.length) {
        html += '<div class="empty-card">Şu an gösterilecek kampanya haberi bulunamadı.</div>';
      } else {
        tumHaberler.forEach(item => {
          html += haberHTML(item, item.havayolu);
        });
      }

      content.innerHTML = html;
    } else {
      const h = havayollari.find(x => x.id === aktifTab);
      if (!h) return;

      let html = `
        <div class="airline-header">
          <div class="airline-dot" style="background:${h.renk}"></div>
          <div class="airline-name">${h.ad}</div>
          <a href="${h.kampanyaUrl}" target="_blank" class="airline-link">Siteye git →</a>
        </div>
      `;

      if (h.durum === 'hata') {
        html += '<div class="error-card">Bu havayolu için veri çekilemedi.</div>';
      } else if (!h.haberler.length) {
        html += '<div class="empty-card">Şu an kampanya haberi bulunamadı.</div>';
      } else {
        h.haberler.forEach(haber => {
          html += haberHTML(haber, h);
        });
      }

      content.innerHTML = html;
    }
  }

  function haberHTML(haber, h) {
    return `
      <a class="news-item" href="${haber.link}" target="_blank">
        <div class="news-title">${haber.baslik}</div>
        <div class="news-meta">
          <span class="news-source">
            <span class="status-dot" style="background:${h.renk}"></span>
            ${h.ad} · ${haber.kaynak}
          </span>
          <span class="news-date">${haber.tarih}</span>
        </div>
      </a>
    `;
  }

  function tabSecById(id) {
    aktifTab = id;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.textContent.toLowerCase().replace(' ', '') === id || 
        (id === 'airfrance' && t.textContent === 'Air France') ||
        (id === 'easyjet' && t.textContent === 'easyJet'));
    });
    if (tumVeri) renderVeri(tumVeri);
  }

  // Sayfa açılınca otomatik yükle
  veriCek();
</script>

</body>
</html>
